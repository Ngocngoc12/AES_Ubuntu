version: '3.8'

services:
  aes-encryption-web:
    container_name: aes-encryption-web
    image: node:16-alpine
    working_dir: /app
    
    volumes:
      - .:/app
      - /app/node_modules
    
    ports:
      - "3000:3000"
    
    environment:
      - NODE_ENV=production
      - PORT=3000
    
    command: sh -c "npm install && node server.js"
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - aes-network

networks:
  aes-network:
    driver: bridge
